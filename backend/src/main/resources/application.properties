spring.application.name=flowerecommerce

server.servlet.context-path=/api

spring.datasource.url=jdbc:mysql://localhost:3306/flowerecommerce
spring.datasource.username=root
spring.datasource.password=ahmed

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

file.upload-dir=upload_images
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


# ✅ Use in-memory session store (spring-session-core, no Redis/DB needed)
spring.session.store-type=none

# Remember-Me secret — use a long random string in production
app.remember-me.key=dev-local-key-not-secret
# app.remember-me.key=${REMEMBER_ME_KEY}

# Session timeout (non-remember-me sessions)
server.servlet.session.timeout=1d